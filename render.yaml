databases:
  - name: doctor-ayurvedha-db
    plan: free

services:
  - type: web
    name: doctor-ayurvedha-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: daphne core.asgi:application --port $PORT --bind 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: doctor-ayurvedha-db
          property: connectionString
